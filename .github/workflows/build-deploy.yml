name: Build & Deploy regulation-check-web

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: regulation-check-web
  DOCKER_NETWORK: regulation-check-net
  CONTAINER_NAME: regulation-check-web
  SECRET_ID: regulation-check/frontend

jobs:
  build-and-deploy:
    name: Build → ECR → Deploy EC2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Authenticate to AWS via OIDC ──
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      # ── Fetch NEXT_PUBLIC_* build-time vars from Secrets Manager ──
      # Next.js inlines NEXT_PUBLIC_* at build time — they must be available here in the runner
      - name: Fetch build-time secrets from AWS Secrets Manager
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            regulation-check/frontend
          parse-json-secrets: true

      # ── Login to ECR ──
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & Push Docker image ──
      - name: Build and push Docker image
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${REGULATION_CHECK_FRONTEND_NEXT_PUBLIC_API_URL}" \
            --build-arg NEXT_PUBLIC_ENGINE_URL="${REGULATION_CHECK_FRONTEND_NEXT_PUBLIC_ENGINE_URL}" \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${REGULATION_CHECK_FRONTEND_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}" \
            -t "$IMAGE:${{ github.sha }}" \
            -t "$IMAGE:latest" \
            .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
          echo "Pushed: $IMAGE:${{ github.sha }}"

      # ── Deploy to EC2 ──
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,ECR_REPOSITORY,DOCKER_NETWORK,CONTAINER_NAME,SECRET_ID
          script: |
            set -e
            ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${AWS_REGION}.amazonaws.com"
            IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

            # Login to ECR
            aws ecr get-login-password --region ${AWS_REGION} | \
              docker login --username AWS --password-stdin ${ECR_REGISTRY}

            # Pull latest image
            docker pull ${IMAGE}

            # Fetch runtime env from Secrets Manager → .env file
            aws secretsmanager get-secret-value \
              --secret-id ${SECRET_ID} \
              --region ${AWS_REGION} \
              --query SecretString --output text | \
              python3 -c "import json,sys; [print(f'{k}={v}') for k,v in json.load(sys.stdin).items()]" \
              > /home/ec2-user/apps/${CONTAINER_NAME}.env

            # Create network if not exists
            docker network create ${DOCKER_NETWORK} 2>/dev/null || true

            # Stop old container
            docker rm -f ${CONTAINER_NAME} 2>/dev/null || true

            # Run new container
            docker run -d \
              --name ${CONTAINER_NAME} \
              --network ${DOCKER_NETWORK} \
              -p 3005:3005 \
              --env-file /home/ec2-user/apps/${CONTAINER_NAME}.env \
              --restart unless-stopped \
              ${IMAGE}

            # Cleanup old images
            docker image prune -f
            echo "Deployed ${CONTAINER_NAME}: ${{ github.sha }}"
